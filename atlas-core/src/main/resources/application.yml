spring:
  application:
    name: atlas-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/atlas}
    username: ${SPRING_DATASOURCE_USERNAME:atlas}
    password: ${SPRING_DATASOURCE_PASSWORD:atlas}
  servlet:
    multipart:
      # Hard ceiling at the servlet layer; atlas.upload.max-file-size below is the
      # actual business-rule limit, enforced in code so oversize uploads get a clean
      # 413 response instead of a container-level error page.
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

atlas:
  upload:
    max-file-size: 25MB
  storage:
    path: ${ATLAS_STORAGE_PATH:./data/documents}
  chunking:
    # Changing these invalidates eval comparability until the corpus is re-ingested —
    # see ChunkingProperties.
    max-tokens: 500
    overlap-tokens: 60
  parsing:
    # Line-level noise (e.g. a source's repeating page footer) to strip before chunking.
    # Empty by default — Atlas core is corpus-agnostic; a deployment supplies its own
    # patterns here or via ATLAS_PARSING_STRIP_LINE_PATTERNS. See ParsingProperties.
    strip-line-patterns: ${ATLAS_PARSING_STRIP_LINE_PATTERNS:}

# Logging is JSON by default (see logback-spring.xml); activate the "local" profile
# (--spring.profiles.active=local) for human-readable console output.

