name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  atlas-core:
    name: atlas-core (Java/Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - working-directory: atlas-core
        run: ./mvnw -B compile

  atlas-evals:
    name: atlas-evals (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - working-directory: atlas-evals
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
