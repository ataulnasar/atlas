name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  atlas-core:
    name: atlas-core (Java/Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - working-directory: atlas-core
        run: ./mvnw -B compile
      - name: Check code formatting (Spotless)
        working-directory: atlas-core
        run: ./mvnw -B spotless:check

  atlas-evals:
    name: atlas-evals (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: atlas-evals/uv.lock
      - working-directory: atlas-evals
        run: uv sync
      - name: Lint (ruff)
        working-directory: atlas-evals
        run: uv run ruff check .
      - name: Test (pytest)
        working-directory: atlas-evals
        run: uv run pytest
