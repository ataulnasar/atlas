name: atlas-v1

services:
  atlas-core:
    build:
      context: ../atlas-core
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-atlas}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-atlas}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      ATLAS_STORAGE_PATH: /data/documents
    volumes:
      - atlas-core-storage:/data/documents
    depends_on:
      postgres:
        condition: service_healthy

  # PostgreSQL 16 + pgvector — the reference/only vector store for v1 (see docs/adr);
  # the embedding dimension couples the schema to the embedding model in use.
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-atlas}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  atlas-core-storage:
